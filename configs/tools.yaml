default_toolset: basic_tools

settings:
  data_root: ../data
  retry:
    max_retries: 2
    base_delay_ms: 200
    max_delay_ms: 1000
    by_exception:
      TimeoutError:
        max_retries: 2
        base_delay_ms: 200
        max_delay_ms: 1000
      ConnectionError:
        max_retries: 3
        base_delay_ms: 200
        max_delay_ms: 1500
  timeout:
    default_timeout_s: 10
  cache:
    enabled: true
    cache_file: ../outputs/B3_tools/tool_cache.json
    cache_errors: false
    ttl_seconds: 15

toolsets:
  basic_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
    - read_and_convert
    - analyze_and_convert
    - code_executor

tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: Calculate a safe arithmetic expression.
    cacheable: true
    timeout_s: 3
    retry:
      max_retries: 0
    parameters:
      expression:
        type: string
        description: Arithmetic expression using numbers and supported operators.
    required: [expression]
    returns:
      result:
        type: number
        description: Calculated value.

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: Read a local UTF-8 txt or md file from the data directory.
    cacheable: true
    timeout_s: 5
    retry:
      max_retries: 1
      by_exception:
        TimeoutError:
          max_retries: 2
    parameters:
      path:
        type: string
        description: Path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return.
    required: [path]
    returns:
      content: {type: string, description: File content.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      truncated: {type: boolean, description: Whether content was truncated.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: Search local txt and md files for query terms.
    cacheable: true
    timeout_s: 8
    retry:
      max_retries: 1
    parameters:
      query: {type: string, description: Search query.}
      root_dir: {type: string, description: Directory relative to data root.}
      file_types:
        type: array
        items: {type: string}
        description: File extensions to search.
      top_k: {type: integer, description: Maximum number of matches.}
    required: [query]
    returns:
      results: {type: array, description: "Ranked paths, snippets, and scores."}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: Analyze a local CSV or TSV file.
    cacheable: true
    timeout_s: 15
    retry:
      max_retries: 1
    parameters:
      path: {type: string, description: Table path relative to data root.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path]
    returns:
      num_rows: {type: integer, description: Data row count.}
      num_columns: {type: integer, description: Column count.}
      columns: {type: array, description: Column names.}
      preview: {type: array, description: First rows.}
      describe: {type: object, description: Numeric statistics by column.}

  format_converter:
    module: skills.format_converter
    function: format_converter
    description: Convert text to markdown bullets or formatted JSON and write the converted content to a file.
    cacheable: false
    timeout_s: 20
    retry:
      max_retries: 0
    parameters:
      text: {type: string, description: Input text.}
      target_format: {type: string, description: markdown or json.}
      output_filename: {type: string, description: Optional output filename. Defaults to converted.md or converted.json.}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}

  read_and_convert:
    module: skills.composite_skills
    function: read_and_convert
    description: Read a local file and convert its content into markdown or JSON format.
    cacheable: false
    timeout_s: 20
    retry:
      max_retries: 1
    parameters:
      path: {type: string, description: File path relative to the configured data root.}
      target_format: {type: string, description: "Target output format, markdown or json."}
      max_chars: {type: integer, description: Maximum number of characters to read from the source file.}
    required: [path]
    returns:
      composite_name: {type: string, description: Composite skill name.}
      steps: {type: array, description: Names of executed sub-skills.}
      step_results: {type: object, description: Outputs returned by each sub-skill.}
      final_output: {type: string, description: Converted final text output.}

  analyze_and_convert:
    module: skills.composite_skills
    function: analyze_and_convert
    description: Analyze a table file and convert the analysis report into markdown or JSON format.
    cacheable: false
    timeout_s: 25
    retry:
      max_retries: 1
    parameters:
      path: {type: string, description: CSV or TSV file path relative to the configured data root.}
      target_format: {type: string, description: "Target output format, markdown or json."}
      max_rows_preview: {type: integer, description: Number of preview rows to analyze.}
      describe: {type: boolean, description: Whether to calculate numeric summary statistics.}
    required: [path]
    returns:
      composite_name: {type: string, description: Composite skill name.}
      steps: {type: array, description: Names of executed sub-skills.}
      step_results: {type: object, description: Outputs returned by each sub-skill.}
      final_output: {type: string, description: Converted final report text.}
      generated_file_path: {type: string, description: Optional generated file path for the converted report.}

  code_executor:
    module: skills.code_executor
    function: code_executor
    description: Execute Python code in a restricted sandbox with safety checks and resource limits.
    cacheable: false
    timeout_s: 20
    retry:
      max_retries: 0
    parameters:
      code: {type: string, description: Python code snippet to execute.}
      timeout: {type: integer, description: "Requested execution timeout in seconds, capped by the sandbox limit."}
    required: [code]
    returns:
      returncode: {type: integer, description: Process return code.}
      stdout: {type: string, description: Standard output text.}
      stderr: {type: string, description: Standard error text.}
      execution_time_ms: {type: number, description: Actual execution time in milliseconds.}
      killed: {type: boolean, description: Whether the process was forcefully terminated.}
      limits: {type: object, description: Effective sandbox limits applied during execution.}
